name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        lib_type: [static, shared]
        include:
          - os: ubuntu-latest
            cmake_preset_args: >-
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_CXX_FLAGS="--coverage"
              -DCMAKE_C_FLAGS="--coverage"
              -DCMAKE_EXE_LINKER_FLAGS="--coverage"
              -DCMAKE_SHARED_LINKER_FLAGS="--coverage"
          - os: windows-latest
            cmake_preset_args: -DCMAKE_BUILD_TYPE=RelWithDebInfo

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -S .
          -DBUILD_SHARED_LIBS=${{ matrix.lib_type == 'shared' && 'ON' || 'OFF' }}
          ${{ matrix.cmake_preset_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Debug gcda
        run: find build -name '*.gcda' | wc -l

      - name: Install gcovr (Linux)
        if: runner.os == 'Linux'
        run: pip install gcovr
        shell: bash

      - name: Generate coverage report (Linux)
        if: runner.os == 'Linux'
        run: |
          gcovr --root . --filter 'lob/.*' --print-summary --html coverage_${{ matrix.lib_type }}.html

      - name: Install OpenCppCoverage (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install opencppcoverage -y
          echo "C:\Program Files\OpenCppCoverage" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Generate coverage report (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe" `
            --modules build `
            --sources lob `
            --export_type html:coverage_${{ matrix.lib_type }} `
            -- ctest --test-dir build --build-config Release

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.lib_type }}
          path: coverage_${{ matrix.lib_type }}.html
          retention-days: 30

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Configure
        run: cmake -B build -S .

      - name: Generate docs
        run: cmake --build build --target docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
